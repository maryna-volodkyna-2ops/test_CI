name: Simple CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-database:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja klienta MySQL
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Sprawdzenie, czy pliki SQL istnieją
        run: |
          test -f database/create_db.sql
          test -f database/create_tasks.sql
          test -f database/seed_tasks.sql

      - name: Uruchomienie create_db.sql
        run: |
          mysql -h 127.0.0.1 -uroot -proot < database/create_db.sql

      - name: Uruchomienie create_tasks.sql
        run: |
          mysql -h 127.0.0.1 -uroot -proot < database/create_tasks.sql

      - name: Uruchomienie seed_tasks.sql
        run: |
          mysql -h 127.0.0.1 -uroot -proot < database/seed_tasks.sql

      - name: Sprawdzenie, czy baza została utworzona
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "SHOW DATABASES LIKE 'db_ci';"

      - name: Sprawdzenie, czy tabela tasks istnieje
        run: |
          mysql -h 127.0.0.1 -uroot -proot -D db_ci -e "SHOW TABLES LIKE 'tasks';"

      - name: Sprawdzenie danych w tabeli tasks
        run: |
          mysql -h 127.0.0.1 -uroot -proot -D db_ci -e "SELECT * FROM tasks;"

      - name: Sprawdzenie liczby rekordów w tasks
        run: |
          COUNT=$(mysql -h 127.0.0.1 -uroot -proot -D db_ci -sse "SELECT COUNT(*) FROM tasks;")
          echo "Liczba rekordów: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "Brak danych w tabeli tasks!"
            exit 1
          fi