name: Simple CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-sql:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja klienta MySQL
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Sprawdzenie, czy plik SQL istnieje
        run: test -f database/create_db.sql

      - name: Uruchomienie skryptu SQL
        run: |
          mysql -h 127.0.0.1 -uroot -proot < database/create_db.sql

      - name: Sprawdzenie, czy baza została utworzona
        run: |
          mysql -h 127.0.0.1 -uroot -proot -e "SHOW DATABASES LIKE 'db_ci';"